version: "3.9"

services:
  api:
    build: .
    image: drivewise:latest
    container_name: drivewise-api
    command: >
      sh -c "python scripts/ingest.py || true;
             uvicorn app.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  ui:
    build: .
    image: drivewise:latest
    container_name: drivewise-ui
    command: >
      sh -c "streamlit run app/ui/streamlit_app.py
             --server.address=0.0.0.0 --server.port=8501"
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - api
    restart: unless-stopped
